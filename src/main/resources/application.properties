spring.application.name=shop_back
server.port=${PORT:8765}

react.api.api.url=${REACT_API_BASE_URL}

#Supabase
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SUPABASEDB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql=trace

kakao.rest.api.key=${KAKAO_REST_API_KEY}
kakao.client.secret=${KAKAO_CLIENT_SECRET_KEY}
kakaopay.secret.key=${KAKAOPAY_SECRET_KEY}